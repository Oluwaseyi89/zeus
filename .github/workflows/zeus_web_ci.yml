name: zeus_web_ci

on:
  push:
    branches:
      - main
      - feature/**
    paths:
      - 'zeus_web/**'
      - '.github/workflows/zeus_web_ci.yml'
  pull_request:
    paths:
      - 'zeus_web/**'
      - '.github/workflows/zeus_web_ci.yml'

permissions:
  contents: read

concurrency:
  group: zeus_web_ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate zeus_web
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: zeus_web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: zeus_web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install lint dependencies
        run: npm install --no-save eslint eslint-config-next

      - name: Create ESLint config
        run: |
          cat > eslint.config.mjs <<'EOF'
          import { defineConfig, globalIgnores } from 'eslint/config';
          import nextVitals from 'eslint-config-next/core-web-vitals';
          import nextTs from 'eslint-config-next/typescript';

          export default defineConfig([
            ...nextVitals,
            ...nextTs,
            globalIgnores(['.next/**', 'out/**', 'build/**', 'next-env.d.ts']),
          ]);
          EOF

      - name: Lint
        run: npx eslint . --max-warnings=0

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: |
          if find . -type f \( -name '*.test.ts' -o -name '*.test.tsx' -o -name '*.spec.ts' -o -name '*.spec.tsx' \) | grep -q .; then
            npx --yes --package jest jest --ci --runInBand --passWithNoTests
          else
            echo 'No web tests found; skipping Jest'
          fi
