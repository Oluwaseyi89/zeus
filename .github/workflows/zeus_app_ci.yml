name: zeus_app_ci

on:
  push:
    branches:
      - main
      - feature/**
    paths:
      - 'zeus_app/**'
      - '.github/workflows/zeus_app_ci.yml'
  pull_request:
    paths:
      - 'zeus_app/**'
      - '.github/workflows/zeus_app_ci.yml'

permissions:
  contents: read

concurrency:
  group: zeus_app_ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate zeus_app
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: zeus_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: zeus_app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Expo project diagnostics
        run: npx expo-doctor

      - name: Lint
        run: npx expo lint

      - name: Type check
        run: npx tsc --noEmit
